shell:
  program: /bin/fish
  args:
    - --login

window:
  dimensions:
    columns: 130
    lines: 35
  padding:
    x: 5
    y: 5
      # decorations: none
  opacity: 0.9


cursor:
  style:
    shape: Underline
    blinking: Off

font:
  normal:
    family: FiraCode Nerd Font
    style: Regular

colors:
  # Default colors
  primary:
    background: '0x2E3440'
    foreground: '0xD8DEE9'

  # Normal colors
  normal:
    black:   '0x3B4252'
    red:     '0xBF616A'
    green:   '0xA3BE8C'
    yellow:  '0xEBCB8B'
    blue:    '0x81A1C1'
    magenta: '0xB48EAD'
    cyan:    '0x88C0D0'
    white:   '0xE5E9F0'

  # Bright colors
  bright:
    black:   '0x4C566A'
    red:     '0xBF616A'
    green:   '0xA3BE8C'
    yellow:  '0xEBCB8B'
    blue:    '0x81A1C1'
    magenta: '0xB48EAD'
    cyan:    '0x8FBCBB'
    white:   '0xECEFF4'
